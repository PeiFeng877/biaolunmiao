name: quick-ci

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:

concurrency:
  group: quick-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      ui_risk: ${{ steps.filter.outputs.ui_risk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed scopes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ui_risk:
              - 'BianLunMiao/Views/**'
              - 'BianLunMiao/DesignSystem/**'
              - 'BianLunMiao/ViewModels/**'
              - 'BianLunMiao/Data/**'
              - 'BianLunMiao/Models/**'
              - 'BianLunMiaoUITests/**'
              - 'BianLunMiao.xcodeproj/**'

  guardrail:
    runs-on: macos-latest
    needs: detect_changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance inventories
        run: swift docs/03_Governance/tools/governance_audit.swift --mode check

      - name: Install lint tools
        run: |
          command -v swiftlint >/dev/null || brew install swiftlint
          command -v swiftformat >/dev/null || brew install swiftformat

      - name: SwiftFormat lint
        run: swiftformat BianLunMiao BianLunMiaoTests BianLunMiaoUITests --lint --lenient

      - name: SwiftLint lint
        run: swiftlint lint --config .swiftlint.yml

      - name: Run unit tests (quick gate)
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available iOS | grep -E "iPhone" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \(.*/\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator: $DEVICE_NAME"
          xcodebuild test \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -only-testing:BianLunMiaoTests \
            CODE_SIGNING_ALLOWED=NO

  ui_smoke:
    runs-on: macos-latest
    needs:
      - detect_changes
      - guardrail
    if: ${{ needs.detect_changes.outputs.ui_risk == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UI smoke tests (risk-based)
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available iOS | grep -E "iPhone" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \(.*/\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator: $DEVICE_NAME"
          xcodebuild test \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -only-testing:BianLunMiaoUITests/testExample \
            -only-testing:BianLunMiaoUITests/testScheduleMonthToDayDetailAndSourceManagement \
            CODE_SIGNING_ALLOWED=NO
