name: full-ci

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

concurrency:
  group: full-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full_regression:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance inventories
        run: swift bianlunmiao-ios/docs/03_Governance/tools/governance_audit.swift --mode check --root bianlunmiao-ios

      - name: Install lint tools
        run: |
          command -v swiftlint >/dev/null || brew install swiftlint
          command -v swiftformat >/dev/null || brew install swiftformat

      - name: SwiftFormat lint
        run: swiftformat bianlunmiao-ios/BianLunMiao bianlunmiao-ios/BianLunMiaoTests bianlunmiao-ios/BianLunMiaoUITests --lint --lenient

      - name: SwiftLint lint
        run: swiftlint lint --config bianlunmiao-ios/.swiftlint.yml

      - name: Run full regression tests
        run: bash scripts/ios_ui_lane.sh full-local
