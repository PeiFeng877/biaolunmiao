name: specialized-ui

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

concurrency:
  group: specialized-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  specialized_ui:
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run specialized UI tests
        run: bash scripts/ios_ui_lane.sh specialized

      - name: Specialized UI status
        if: ${{ failure() }}
        run: |
          echo "::warning::Specialized UI tests failed. Functional lanes remain the hard gate."
