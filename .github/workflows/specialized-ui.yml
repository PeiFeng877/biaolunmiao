name: specialized-ui

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '30 19 * * *'
  workflow_dispatch:

concurrency:
  group: specialized-ui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  launch_special:
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run launch specialized tests
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available iOS | grep -E "iPhone" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \(.*/\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          mkdir -p artifacts
          echo "Using simulator: $DEVICE_NAME"
          xcodebuild build-for-testing \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -parallel-testing-enabled NO \
            -maximum-parallel-testing-workers 1 \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild test-without-building \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -parallel-testing-enabled NO \
            -maximum-parallel-testing-workers 1 \
            -only-testing:BianLunMiaoUITests/BianLunMiaoUITestsLaunchTests \
            -resultBundlePath artifacts/launch-specialized.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Launch specialized status
        if: ${{ failure() }}
        run: |
          echo "::warning::Launch specialized tests failed. Functional full regression is not blocked."

  performance_special:
    runs-on: macos-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run performance specialized tests
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available iOS | grep -E "iPhone" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \(.*/\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          mkdir -p artifacts
          echo "Using simulator: $DEVICE_NAME"
          xcodebuild build-for-testing \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -parallel-testing-enabled NO \
            -maximum-parallel-testing-workers 1 \
            CODE_SIGNING_ALLOWED=NO
          xcodebuild test-without-building \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            -parallel-testing-enabled NO \
            -maximum-parallel-testing-workers 1 \
            -only-testing:BianLunMiaoUITests/BianLunMiaoUITests/testLaunchPerformance \
            -resultBundlePath artifacts/performance-specialized.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Performance specialized status
        if: ${{ failure() }}
        run: |
          echo "::warning::Performance specialized tests failed. Functional full regression is not blocked."
