name: design-governance

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  guardrail:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate governance inventories
        run: swift docs/03_Governance/tools/governance_audit.swift --mode check

      - name: Run unit tests
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available | grep -E "iPhone" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \\(.*/\\1/' | xargs)
          if [ -z "$DEVICE_NAME" ]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "Using simulator: $DEVICE_NAME"
          xcodebuild test \
            -project BianLunMiao.xcodeproj \
            -scheme BianLunMiao \
            -destination "platform=iOS Simulator,name=$DEVICE_NAME" \
            CODE_SIGNING_ALLOWED=NO
