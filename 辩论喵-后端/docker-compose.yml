services:
  postgres:
    image: postgres:16
    container_name: bianlunmiao-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bianlunmiao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bianlunmiao"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: bianlunmiao-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
